name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions requises pour le déploiement Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build (mode démo)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      # base-href = /<repo>/ pour que GitHub Pages résolve les assets.
      # La config production active le mode démo (environment.production.ts).
      - name: Build
        run: npx ng build --configuration production --base-href "/${{ github.event.repository.name }}/"

      # SPA fallback : Pages sert 404.html pour les routes inconnues.
      - name: SPA 404 fallback
        run: cp dist/site-guardian/browser/index.html dist/site-guardian/browser/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist/site-guardian/browser

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
